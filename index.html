<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Millenium Côte d'Ivoire | Partenaire Patrimonial</title>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="icon" type="image/png" href="assets/icons/icon-512.png">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#1e7f6e">
    <!-- Styles bundled by Vite -->
    <style>
        :root {
            /* BASE (Theme Logo) */
            --background: #FFFFFF;
            --background-soft: #F9FAFB;
            --surface: #FFFFFF;

            /* TEXTES */
            --text-primary: #175E30;
            --text-secondary: #2C3E33;
            --text-muted: #5C6C67;
            --text-dark: #175E30;

            /* ACCENTS PREMIUM */
            --primary: #F05A22;
            --secondary: #175E30;
            --accent: #E5A814;

            /* COMPATIBILITÉ */
            --soft-green: #F0FAF3;
            --glass: rgba(255, 255, 255, 0.9);

            /* BORDURES */
            --border-soft: rgba(23, 94, 48, 0.1);
            --border-strong: rgba(23, 94, 48, 0.2);

            /* OVERLAYS */
            --overlay-dark: rgba(0, 0, 0, 0.55);
            --overlay-soft: rgba(255, 255, 255, 0.85);

            /* STATES */
            --success: #175E30;
            --warning: #F05A22;

            /* TYPO & OMBRES */
            --font-heading: 'Montserrat', sans-serif;
            --font-body: 'Montserrat', sans-serif;
            --shadow-soft: 0 10px 30px rgba(23, 94, 48, 0.08);
            --shadow-premium: 0 20px 40px rgba(23, 94, 48, 0.15);
            --transition: all 400ms cubic-bezier(0.23, 1, 0.32, 1);
        }

        body.dark-mode {
            /* THÈME FORÊT PROFONDE / OR */
            --background: #0A120E;
            --background-soft: #101B15;
            --surface: #14241C;
            
            --text-primary: #F5F3EE;
            --text-secondary: #D8C3A5;
            --text-muted: #8C857B;
            --text-dark: #F5F3EE;
            
            --primary: #F05A22;
            --secondary: #F5F3EE;
            --accent: #E5A814;
            
            --soft-green: #101B15;
            --glass: rgba(10, 18, 14, 0.85);
            
            --border-soft: rgba(245, 243, 238, 0.05);
            --border-strong: rgba(245, 243, 238, 0.1);
            
            --shadow-soft: 0 10px 30px rgba(0, 0, 0, 0.3);
            --shadow-premium: 0 20px 40px rgba(0, 0, 0, 0.5);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        html { scroll-behavior: smooth; }
        body { font-family: var(--font-body); background-color: var(--background); color: var(--text-dark); line-height: 1.7; overflow-x: hidden; -webkit-font-smoothing: antialiased; }
        h1, h2, h3, h4 { font-family: var(--font-heading); font-weight: 700; line-height: 1.2; }
        .container { max-width: 1280px; margin: 0 auto; padding: 0 40px; }

        header { background: var(--glass); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); border-bottom: 1px solid var(--border-soft); position: fixed; width: 100%; top: 0; z-index: 5000; height: 120px; display: flex; align-items: center; }
        nav { display: flex; justify-content: space-between; align-items: center; width: 100%; transition: var(--transition); }
        .logo { font-family: var(--font-heading); font-size: 2rem; font-weight: 700; color: var(--secondary); text-decoration: none; display: flex; align-items: center; gap: 12px; margin-right: 60px; }
        ul.nav-links { display: flex; gap: 50px; list-style: none; align-items: center; margin-left: auto; margin-right: 50px; }
        ul.nav-links a { text-decoration: none; color: var(--secondary); font-weight: 700; font-size: 1.05rem; transition: var(--transition); text-transform: uppercase; letter-spacing: 1px; }
        ul.nav-links a:hover { color: var(--primary); }
        
        .btn { background: var(--primary); color: #fff; padding: 14px 28px; border-radius: 50px; text-decoration: none; font-weight: 600; transition: var(--transition); display: inline-flex; align-items: center; gap: 10px; box-shadow: var(--shadow-soft); border: none; cursor: pointer; }
        .btn:hover { background: var(--secondary); transform: translateY(-3px); box-shadow: var(--shadow-premium); }
        .btn-sm { padding: 8px 22px; font-size: 0.9rem; }
        .btn-outline { background: transparent; border: 2px solid var(--primary); color: var(--primary); }
        .btn-outline:hover { background: var(--primary); color: #fff; }

        .section-title { text-align: center; margin-bottom: 60px; }
        .section-title h2 { font-size: 3rem; color: var(--secondary); margin-bottom: 15px; }
        .section-title span { display: block; width: 80px; height: 3px; background: var(--accent); margin: 0 auto; }

        /* Sections spacing */
        section { padding: 100px 0; }

        /* Progress Bar (N3-006) */
        .progress-bar-container { position: fixed; top: 0; left: 0; width: 100%; height: 4px; z-index: 10000; background: transparent; }
        .progress-bar { height: 100%; background: var(--primary); width: 0%; transition: width 0.1s ease; box-shadow: 0 0 10px var(--primary); }

        /* WhatsApp Widget */
        .whatsapp-widget { 
            position: fixed; 
            bottom: 100px; 
            right: 40px; 
            background: #25D366; 
            color: white; 
            width: 60px; 
            height: 60px; 
            border-radius: 50%; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            font-size: 30px; 
            box-shadow: 0 10px 25px rgba(37, 211, 102, 0.4); 
            z-index: 4500; 
            cursor: pointer; 
            transition: var(--transition);
            text-decoration: none;
            animation: pulse-wa 2s infinite;
        }
        .whatsapp-widget:hover { 
            transform: scale(1.1) translateY(-5px); 
            box-shadow: 0 15px 30px rgba(37, 211, 102, 0.6); 
        }
        @keyframes pulse-wa {
            0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(37, 211, 102, 0.7); }
            70% { transform: scale(1.05); box-shadow: 0 0 0 15px rgba(37, 211, 102, 0); }
            100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(37, 211, 102, 0); }
        }
        @media (max-width: 768px) {
            .whatsapp-widget { bottom: 90px; right: 20px; width: 50px; height: 50px; font-size: 24px; }
        }
    </style>
</head>
<body>
    <header>
        <div class="container">
            <nav id="main-nav">
                <a href="#" class="logo" style="text-decoration: none;">
                    <img src="./assets/logo.jpg" alt="Millenium Côte d'Ivoire Logo" style="height: 100px; width: auto; border-radius: 16px; mix-blend-mode: multiply;">
                </a>
                
                <ul class="nav-links">
                    <li><a href="#activites" class="nav-link">Activités</a></li>
                    <li><a href="#produits" class="nav-link">Produits</a></li>
                    <li><a href="#contact" class="nav-link">Contact</a></li>
                </ul>

                <div class="nav-actions" style="display: flex; align-items: center; gap: 30px;">
                    <button id="theme-toggle" class="theme-btn" aria-label="Basculer le thème" style="background: none; border: none; color: var(--secondary); font-size: 1.2rem; cursor: pointer; transition: var(--transition);">
                        <i class="fas fa-moon"></i>
                    </button>
                    <a href="admin.html" class="btn btn-sm" style="color: #fff; border-radius: 12px; font-weight: 700; padding: 12px 28px;">Admin</a>
                </div>

                <button class="burger" id="mobile-burger" aria-label="Menu Mobile">
                    <span></span>
                    <span></span>
                    <span></span>
                </button>
            </nav>
        </div>
    </header>

    <main>
        <!-- Hero Section ([Sprint 1] Hydrated via config.json) -->
        <div id="hero-slider-container"></div>

        <!-- Numbers Section ([Sprint 1] Counter section) -->
        <div id="numbers-section-container"></div>

        <!-- About Section ([Sprint 1]) -->
        <section id="about" class="about-section reveal">
            <div class="container">
                <div class="about-grid">
                    <div id="about-text-container">
                        <!-- Hydrated by main.js -->
                    </div>
                </div>
            </div>
        </section>

        <!-- Activites Section ([Sprint 1]) -->
        <section id="activites" class="activites-section reveal">
            <div class="container">
                <div class="section-title">
                    <h2>Nos Activités Stratégiques</h2>
                    <span></span>
                </div>
                <div id="activities-container"></div>
            </div>
        </section>

        <!-- Products Section ([Sprint 2]) -->
        <section id="produits" class="product-section reveal">
            <div class="container">
                <div class="section-title">
                    <h2>Catalogue des Projets</h2>
                    <span></span>
                    <p style="margin-top: 20px;">Découvrez notre sélection de solutions et d'investissements immobiliers premium.</p>
                </div>
                <div id="filter-bar-container"></div>
                <div id="product-grid-container" style="margin-top: 40px;"></div>
            </div>
        </section>

        <!-- Partners Section ([Sprint 1]) -->
        <div id="partners-section-container" class="reveal"></div>

        <section id="identite" class="identity reveal">
            <div class="container">
                <div class="section-title">
                    <h2>Notre Engagement</h2>
                    <span></span>
                </div>
                <div id="engagement-cards-container"></div>
            </div>
        </section>

        <!-- Section Statistiques (ProMax Phase 2) -->
        <div id="stats-section-container"></div>

        <!-- SECTION CONTACT CORRIGÉE -->
        <section id="contact" class="contact-section reveal">
          <div class="container" id="contact-container">
            <!-- Dynamisé par ContactForm.render() -->
          </div>
        </section>
    </main>

    <!-- Footer ([Sprint 1]) -->
    <!-- FOOTER CORRIGÉ -->
    <!-- Footer ([Sprint 1] Dynamisé) -->
    <div id="footer-container"></div>

    <!-- Product Modal ([Sprint 2]) -->
    <div id="product-modal-container"></div>

    <!-- Sticky CTA ([Sprint 2]) -->
    <div id="sticky-cta-container"></div>

    <!-- Toast Container (N3-013) -->
    <div id="toast-root"></div>

    <!-- Mobile Bottom Navigation (Sprint 4 ProMax) -->
    <div id="bottom-nav-container"></div>

    <!-- Back to Top Button -->
    <button id="back-to-top" class="back-to-top" aria-label="Retour en haut">
        <i class="fas fa-arrow-up"></i>
    </button>

    <!-- Image Zoom Overlay (ProMax Phase 2) -->
    <div id="image-zoom-overlay" class="image-zoom-overlay">
        <img id="zoomed-image" src="" alt="Agrandissement">
    </div>

    <script type="module" src="js/refinements.js"></script>
    <script type="module" src="js/main.js"></script>
    <!-- PWA Service Worker Registration -->
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('./sw.js')
            .then(reg => console.log('[PWA] Service Worker Registered', reg))
            .catch(err => console.log('[PWA] Service Worker Failed', err));
        });
      }
    </script>
</body>
</html>
