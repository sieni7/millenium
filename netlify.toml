[build]
  command = "npm run build"
  publish = "dist"
  environment = { NODE_VERSION = "22" }

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

[[headers]]
  for = "/admin.html"
  [headers.values]
    Cache-Control = "no-store, must-revalidate"

# ============================================================
# MODE MAINTENANCE
# Pour ACTIVER  : décommentez les 4 lignes ci-dessous
# Pour DÉSACTIVER : recommentez les 4 lignes ci-dessous
# ============================================================
[[redirects]]
  from = "/*"
  to = "/maintenance.html"
  status = 302
  force = true

# ============================================================
# REDIRECTS NORMAUX (toujours actifs)
# ============================================================
[[redirects]]
  from = "/admin"
  to = "/admin.html"
  status = 301

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
  force = false